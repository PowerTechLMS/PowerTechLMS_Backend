services:
  antigravity-manager:
    image: lbjlaq/antigravity-manager:latest
    container_name: antigravity-manager
    restart: always
    ports:
      - "6002:8045"
    environment:
      - API_KEY=sk-13e046ad73d5448885649171b2b8e828
      - WEB_PASSWORD=Powertech1@
      - ABV_MAX_BODY_SIZE=104857600
    volumes:
      - ~/.antigravity_tools:/root/.antigravity_tools

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lms-qdrant
