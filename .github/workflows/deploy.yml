name: Powertech Backend - Deploy
on:
  push:
    branches:
      - master
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Prepare AppSettings
        run: |
          cp LMS.API/appsettings.Template.json appsettings.Production.json
          sed -i '/^[[:blank:]]*\/\//d' appsettings.Production.json
          sed -i 's|[[:blank:]]\+//.*||g' appsettings.Production.json
      - name: Inject Secrets
        env:
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          jq '
            .DatabaseProvider = "PostgreSql" |
            .AllowedHosts = env.ALLOWED_HOSTS |
            .ConnectionStrings.DefaultConnection = env.DB_CONNECTION_STRING |
            .Jwt.Secret = env.JWT_SECRET_KEY |
            .Jwt.Issuer = env.JWT_ISSUER |
            .Jwt.Audience = env.JWT_AUDIENCE |
            .EmailSettings.SmtpHost = env.SMTP_HOST |
            .EmailSettings.SmtpPort = env.SMTP_PORT |
            .EmailSettings.SmtpUser = env.SMTP_USER |
            .EmailSettings.SmtpPass = env.SMTP_PASS |
            .EmailSettings.FromEmail = env.FROM_EMAIL |
            .LlmSettings.ApiUrl = env.LLM_API_URL |
            .LlmSettings.ApiKey = env.LLM_API_KEY |
            .Qdrant.Url = env.QDRANT_URL |
            .FrontendUrl = env.FRONTEND_URL
          ' appsettings.Production.json > tmp.json && mv tmp.json appsettings.Production.json
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build LMS.API/LMS.API.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish LMS.API/LMS.API.csproj --configuration Release --no-build --output ./publish -p:CopyOutputSymbolsToPublishDirectory=false -p:DebugType=None
      - name: Move AppSettings to Publish Folder
        run: cp appsettings.Production.json ./publish/
      - name: Check Publish Size
        run: du -sh ./publish/*
      - name: Clean Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: |
            rm -rf /var/www/powertech/backend/*
      - name: Copy Files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          source: ./publish/*
          target: /var/www/powertech/backend
          strip_components: 1
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/powertech/backend
            ASPNETCORE_ENVIRONMENT=Production dotnet LMS.API.dll --migrate
            sudo systemctl restart powertech.service
